<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="Search.css">
    <script src="https://kit.fontawesome.com/abd8dcaad7.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="search-box">
        <div class="row">
            <input type="text" placeholder="Search Here" id="input-box" autocomplete="off">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
            <button>Simply</button>
        </div>
        <div class="result-box">
        </div>
    </div>
</body>
<script>
    let keywords = [
        'For Example I Added..',
        'This 4th Commit',
        'For Example I Added for 5th Commit',
        'This is Fifth Commit',
        'For Example I Added for 6th Commit',
        'This is Sixth Commit'
    ];
    console.log('7th Added');
    var inputbox = document.getElementById("input-box");
    var resultbox = document.querySelector(".result-box");
    var resultbox1 = document.querySelector(".result-box");


    inputbox.onkeyup = function(){
        let result = [];
        let input = inputbox.value;
        if(input.length){
            result = keywords.filter((keys)=>{
                return keys.toLowerCase().includes(input.toLowerCase());
            });
            console.log(result);
            
        }
        display(result);
    }

    function display(result){
        var content = result.map((list)=>{
            return "<li onclick=selectInput(this)>"+list+"</li>";
        });
        resultbox.innerHTML = "<ul>"+content.join('')+"</ul>";
    }

    function selectInput(list){
        inputbox.value = list.innerHTML;
        resultbox.innerHTML ='';
    }

</script>
</html>
